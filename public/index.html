<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reel Swap Me In</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:#0e0d12; color:#f3f1ec; font:16px/1.5 -apple-system, "Segoe UI", sans-serif; }
  main { width:min(560px, 92vw); padding:40px 0; text-align:center; }
  h1 { font-size:1.7rem; margin:0 0 4px; letter-spacing:-.02em; }
  p.sub { color:#9a96a8; margin:0 0 28px; }
  form { display:flex; gap:8px; }
  input { flex:1; padding:13px 16px; border-radius:12px; border:1px solid #2c2a36;
          background:#17151e; color:inherit; font-size:15px; outline:none; }
  input:focus { border-color:#7c6cf2; }
  button { padding:13px 22px; border:0; border-radius:12px; background:#7c6cf2; color:#fff;
           font-size:15px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  #status { margin-top:26px; min-height:24px; color:#c9c5d8; }
  #status.error { color:#ff7b7b; }
  .spinner { display:inline-block; width:14px; height:14px; margin-right:8px; vertical-align:-2px;
             border:2px solid #7c6cf2; border-top-color:transparent; border-radius:50%;
             animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  video { margin-top:24px; width:100%; max-height:70vh; border-radius:16px; background:#000; }
  a.dl { display:inline-block; margin-top:12px; color:#a99cff; }
  #setup .card { display:flex; align-items:center; justify-content:space-between;
                 gap:12px; margin-top:12px; padding:12px 16px; border-radius:12px;
                 border:1px solid #2c2a36; background:#17151e; font-size:14px;
                 color:#c9c5d8; text-align:left; }
  #setup button { padding:9px 14px; font-size:13.5px; white-space:nowrap; }
  #engineRow, #restoreRow { margin-top:14px; display:flex; gap:18px; justify-content:center;
               font-size:13.5px; color:#c9c5d8; }
  #restoreRow { margin-top:10px; }
  #restoreRow[hidden] { display:none; }
  #engineRow input, #restoreRow input { accent-color:#7c6cf2; margin-right:5px; }
  #engineRow .tag, #restoreRow .tag { font-size:11px; color:#9a96a8; border:1px solid #2c2a36;
                    border-radius:6px; padding:1px 6px; margin-left:4px; }
  #setupState { margin:8px 0 0; font-size:12px; color:#6f6a80; }
  #setupState a { color:#a99cff; margin-left:8px; }
  #picker input[type=range] { width:100%; margin-top:2px; accent-color:#7c6cf2; }
  .sliderLabel { display:block; margin-top:12px; text-align:left; font-size:13px; color:#9a96a8; }
  #rangeLabel { margin:10px 0 14px; color:#c9c5d8; }
</style>
</head>
<body>
<main>
  <h1>Reel Swap Me In</h1>
  <p class="sub">Paste an Instagram Reel URL — get it back starring you.</p>
  <form id="f">
    <input id="url" type="url" placeholder="https://www.instagram.com/reel/…" required>
    <button id="go" type="submit">Replicate</button>
  </form>
  <div id="setup" hidden>
    <div class="card" id="authCard" hidden>
      <span>1 · Connect your Higgsfield account</span>
      <button id="connectBtn" type="button">Connect Higgsfield</button>
    </div>
    <div class="card" id="photoCard" hidden>
      <span>2 · Add a clear, front-facing photo of you</span>
      <button id="photoBtn" type="button">Choose photo</button>
      <input id="photoInput" type="file" accept="image/jpeg,image/png" hidden>
    </div>
  </div>
  <div id="engineRow">
    <label><input type="radio" name="engine" value="kling" checked> Kling motion control</label>
    <label><input type="radio" name="engine" value="seedance"> Seedance 2.0 <span class="tag">experimental</span></label>
  </div>
  <div id="restoreRow" hidden>
    <label><input type="checkbox" id="restoreChk" checked> Restore my face after the swap <span class="tag">local · free · ~1 min/s</span></label>
  </div>
  <p id="setupState"><span id="setupStateText"></span><a id="changePhoto" href="#" hidden>Change photo</a><a id="addFaces" href="#" hidden></a><a id="clearFaces" href="#" hidden>clear extras</a></p>
  <input id="facesInput" type="file" accept="image/jpeg,image/png" multiple hidden>
  <div id="status"></div>
  <div id="picker" hidden>
    <video id="pickVideo" muted playsinline></video>
    <label class="sliderLabel">Start</label>
    <input id="startRange" type="range" min="0" max="0" step="0.1" value="0">
    <label class="sliderLabel">Length</label>
    <input id="lengthRange" type="range" min="5" max="15" step="0.5" value="15">
    <div id="rangeLabel"></div>
    <button id="useClip" type="button">Use this part</button>
  </div>
  <div id="result"></div>
</main>
<script>
const f = document.getElementById("f"), urlEl = document.getElementById("url"),
      go = document.getElementById("go"), statusEl = document.getElementById("status"),
      resultEl = document.getElementById("result"),
      picker = document.getElementById("picker"), pickVideo = document.getElementById("pickVideo"),
      startRange = document.getElementById("startRange"), rangeLabel = document.getElementById("rangeLabel"),
      lengthRange = document.getElementById("lengthRange"), useClip = document.getElementById("useClip");
const setupEl = document.getElementById("setup"), authCard = document.getElementById("authCard"),
      photoCard = document.getElementById("photoCard"), connectBtn = document.getElementById("connectBtn"),
      photoBtn = document.getElementById("photoBtn"), photoInput = document.getElementById("photoInput");
const restoreRow = document.getElementById("restoreRow"), restoreChk = document.getElementById("restoreChk"),
      addFaces = document.getElementById("addFaces"), clearFaces = document.getElementById("clearFaces"),
      facesInput = document.getElementById("facesInput");
const MIN_LEN = 5, MAX_LEN = 15;
let timer = null, ticker = null, startTime = null, lastDetail = "", jobId = null, reelDuration = 0;
let statusTimer = null;

async function refreshStatus() {
  try {
    const s = await (await fetch("/api/status")).json();
    const ready = s.connected && s.photo;
    authCard.hidden = s.connected;
    photoCard.hidden = !!s.photo;
    setupEl.hidden = ready;
    document.getElementById("setupStateText").textContent = ready
      ? `Higgsfield connected ✓ (${s.source === "app" ? "in-app login" : "via Claude Code"}) · photo saved ✓`
      : "";
    document.getElementById("changePhoto").hidden = !s.photo;
    restoreRow.hidden = !s.faceRestore;
    addFaces.hidden = !(s.faceRestore && s.photo);
    addFaces.textContent = s.extraFaces
      ? `Add face photos (${s.extraFaces} extra)` : "Add face photos";
    clearFaces.hidden = !s.extraFaces;
    if (ready) {
      if (statusTimer) { clearInterval(statusTimer); statusTimer = null; }
      if (!timer) go.disabled = false;   // don't re-enable mid-run
    } else {
      go.disabled = true;
    }
  } catch { /* server starting up — retry on next tick */ }
}

connectBtn.addEventListener("click", async () => {
  try {
    const r = await fetch("/api/auth/start", { method: "POST" });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || "Couldn't start the login");
    window.open(d.authUrl, "_blank");
    setStatus("Finish the Higgsfield login in the new tab…");
  } catch (err) {
    setStatus(err.message, { error: true });
  }
});

photoBtn.addEventListener("click", () => photoInput.click());
document.getElementById("changePhoto").addEventListener("click", (e) => {
  e.preventDefault();
  photoInput.click();
});
photoInput.addEventListener("change", async () => {
  const file = photoInput.files[0];
  if (!file) return;
  photoInput.value = "";   // allow re-picking the same file later
  const r = await fetch("/api/photo", {
    method: "POST",
    headers: { "Content-Type": file.type || "application/octet-stream" },
    body: file,
  });
  const d = await r.json();
  if (!r.ok) setStatus(d.error || "Photo upload failed", { error: true });
  else {
    setStatus("Photo saved ✓ — your character reference will regenerate on the next run (1 credit).");
    refreshStatus();
  }
});

addFaces.addEventListener("click", (e) => { e.preventDefault(); facesInput.click(); });
clearFaces.addEventListener("click", async (e) => {
  e.preventDefault();
  await fetch("/api/faces/clear", { method: "POST" });
  refreshStatus();
});
facesInput.addEventListener("change", async () => {
  const files = [...facesInput.files];
  facesInput.value = "";
  let saved = 0, error = null;
  try {
    for (const file of files) {
      const r = await fetch("/api/faces", {
        method: "POST",
        headers: { "Content-Type": file.type || "application/octet-stream" },
        body: file,
      });
      const d = await r.json();
      if (!r.ok) { error = d.error || "Upload failed"; break; }
      saved++;
    }
  } catch (err) {
    error = err.message;
  }
  if (error) setStatus(error, { error: true });
  else setStatus(`${saved} face photo${saved === 1 ? "" : "s"} added ✓ — varied angles and lighting help most.`);
  refreshStatus();
});

refreshStatus();
statusTimer = setInterval(refreshStatus, 3000);

function fmtClock(totalSeconds) {
  const s = Math.max(0, Math.floor(totalSeconds));
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
}

function fmtElapsed() {
  return fmtClock((Date.now() - startTime) / 1000);
}

function setStatus(text, { spin = false, error = false } = {}) {
  statusEl.className = error ? "error" : "";
  const elapsed = spin && startTime
    ? ` <span style="color:#6f6a80">(${fmtElapsed()})</span>` : "";
  statusEl.innerHTML = (spin ? '<span class="spinner"></span>' : "") + text + elapsed;
}

function stopTimers() {
  clearInterval(timer); clearInterval(ticker);
  timer = ticker = null;
}

function startPolling() {
  timer = setInterval(() => poll(jobId), 2000);
  ticker = setInterval(() => { if (startTime) setStatus(lastDetail, { spin: true }); }, 1000);
}

function hidePicker() {
  picker.hidden = true;
  pickVideo.pause();
  pickVideo.removeAttribute("src");
  pickVideo.load();
}

function clipStart() { return parseFloat(startRange.value) || 0; }
function clipLength() { return parseFloat(lengthRange.value) || MAX_LEN; }

function syncSliders() {
  // start can reach only as far as duration - length
  startRange.max = Math.max(0, reelDuration - clipLength()).toFixed(1);
  if (clipStart() > parseFloat(startRange.max)) startRange.value = startRange.max;
  const s = clipStart(), len = clipLength();
  rangeLabel.textContent =
    `Using ${fmtClock(s)} → ${fmtClock(s + len)} of the reel (${len}s clip)`;
}

function showPicker(job) {
  stopTimers(); startTime = null;
  setStatus(job.detail || "Pick the part of the reel to use.");
  reelDuration = job.duration;
  lengthRange.max = Math.min(MAX_LEN, Math.floor(job.duration * 2) / 2);
  lengthRange.value = lengthRange.max;
  startRange.value = 0;
  syncSliders();
  pickVideo.src = job.reelUrl;
  picker.hidden = false;
  pickVideo.play().catch(() => {});
}

startRange.addEventListener("input", () => {
  syncSliders();
  pickVideo.currentTime = clipStart();
});

lengthRange.addEventListener("input", () => {
  syncSliders();
  pickVideo.currentTime = clipStart();
});

// Preview loops only the selected window.
pickVideo.addEventListener("timeupdate", () => {
  if (picker.hidden) return;
  const s = clipStart();
  if (pickVideo.currentTime > s + clipLength() || pickVideo.currentTime < s - 0.4) {
    pickVideo.currentTime = s;
    pickVideo.play().catch(() => {});
  }
});
pickVideo.addEventListener("ended", () => {
  if (!picker.hidden) { pickVideo.currentTime = clipStart(); pickVideo.play().catch(() => {}); }
});

useClip.addEventListener("click", async () => {
  useClip.disabled = true;
  try {
    const r = await fetch(`/api/jobs/${jobId}/clip`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ start: clipStart(), length: clipLength() }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "Request failed");
    hidePicker();
    startTime = Date.now(); lastDetail = "Clipping your selection…";
    setStatus(lastDetail, { spin: true });
    startPolling();
  } catch (err) {
    setStatus(err.message, { error: true });
  } finally {
    useClip.disabled = false;
  }
});

async function poll(jobId) {
  try {
    const r = await fetch(`/api/jobs/${jobId}`);
    const job = await r.json();
    if (job.status === "done") {
      stopTimers(); go.disabled = false;
      // job.warning can carry raw subprocess output — escape it.
      const esc = (s) => s.replace(/[&<>]/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      setStatus(`Done in ${fmtElapsed()} — here's you:` +
                (job.warning ? ` (${esc(job.warning)})` : ""));
      startTime = null;
      resultEl.innerHTML =
        `<video controls autoplay loop src="${job.resultUrl}"></video>` +
        `<a class="dl" href="${job.resultUrl}" download>Download video</a>`;
    } else if (job.status === "awaiting_selection") {
      if (picker.hidden) showPicker(job);
    } else if (job.status === "error") {
      stopTimers(); startTime = null; go.disabled = false;
      setStatus(job.error || "Something went wrong.", { error: true });
    } else {
      lastDetail = job.detail || "Working…";
      setStatus(lastDetail, { spin: true });
    }
  } catch { /* transient — keep polling */ }
}

f.addEventListener("submit", async (e) => {
  e.preventDefault();
  resultEl.innerHTML = ""; go.disabled = true;
  hidePicker();
  stopTimers(); startTime = Date.now(); lastDetail = "Starting…";
  setStatus(lastDetail, { spin: true });
  try {
    const r = await fetch("/api/replicate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        reelUrl: urlEl.value,
        engine: document.querySelector('input[name="engine"]:checked').value,
        restore: !restoreRow.hidden && restoreChk.checked,
      }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "Request failed");
    jobId = data.jobId;
    startPolling();
  } catch (err) {
    stopTimers(); startTime = null; go.disabled = false;
    setStatus(err.message, { error: true });
  }
});
</script>
</body>
</html>
