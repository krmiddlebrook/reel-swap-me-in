<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reel Replicate Me</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:#0e0d12; color:#f3f1ec; font:16px/1.5 -apple-system, "Segoe UI", sans-serif; }
  main { width:min(560px, 92vw); padding:40px 0; text-align:center; }
  h1 { font-size:1.7rem; margin:0 0 4px; letter-spacing:-.02em; }
  p.sub { color:#9a96a8; margin:0 0 28px; }
  form { display:flex; gap:8px; }
  input { flex:1; padding:13px 16px; border-radius:12px; border:1px solid #2c2a36;
          background:#17151e; color:inherit; font-size:15px; outline:none; }
  input:focus { border-color:#7c6cf2; }
  button { padding:13px 22px; border:0; border-radius:12px; background:#7c6cf2; color:#fff;
           font-size:15px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  #status { margin-top:26px; min-height:24px; color:#c9c5d8; }
  #status.error { color:#ff7b7b; }
  .spinner { display:inline-block; width:14px; height:14px; margin-right:8px; vertical-align:-2px;
             border:2px solid #7c6cf2; border-top-color:transparent; border-radius:50%;
             animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  video { margin-top:24px; width:100%; max-height:70vh; border-radius:16px; background:#000; }
  a.dl { display:inline-block; margin-top:12px; color:#a99cff; }
  #picker input[type=range] { width:100%; margin-top:2px; accent-color:#7c6cf2; }
  .sliderLabel { display:block; margin-top:12px; text-align:left; font-size:13px; color:#9a96a8; }
  #rangeLabel { margin:10px 0 14px; color:#c9c5d8; }
</style>
</head>
<body>
<main>
  <h1>Reel Replicate Me</h1>
  <p class="sub">Paste an Instagram Reel URL — get it back starring you.</p>
  <form id="f">
    <input id="url" type="url" placeholder="https://www.instagram.com/reel/…" required>
    <button id="go" type="submit">Replicate</button>
  </form>
  <div id="status"></div>
  <div id="picker" hidden>
    <video id="pickVideo" muted playsinline></video>
    <label class="sliderLabel">Start</label>
    <input id="startRange" type="range" min="0" max="0" step="0.1" value="0">
    <label class="sliderLabel">Length</label>
    <input id="lengthRange" type="range" min="5" max="15" step="0.5" value="15">
    <div id="rangeLabel"></div>
    <button id="useClip" type="button">Use this part</button>
  </div>
  <div id="result"></div>
</main>
<script>
const f = document.getElementById("f"), urlEl = document.getElementById("url"),
      go = document.getElementById("go"), statusEl = document.getElementById("status"),
      resultEl = document.getElementById("result"),
      picker = document.getElementById("picker"), pickVideo = document.getElementById("pickVideo"),
      startRange = document.getElementById("startRange"), rangeLabel = document.getElementById("rangeLabel"),
      lengthRange = document.getElementById("lengthRange"), useClip = document.getElementById("useClip");
const MIN_LEN = 5, MAX_LEN = 15;
let timer = null, ticker = null, startTime = null, lastDetail = "", jobId = null, reelDuration = 0;

function fmtClock(totalSeconds) {
  const s = Math.max(0, Math.floor(totalSeconds));
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
}

function fmtElapsed() {
  return fmtClock((Date.now() - startTime) / 1000);
}

function setStatus(text, { spin = false, error = false } = {}) {
  statusEl.className = error ? "error" : "";
  const elapsed = spin && startTime
    ? ` <span style="color:#6f6a80">(${fmtElapsed()})</span>` : "";
  statusEl.innerHTML = (spin ? '<span class="spinner"></span>' : "") + text + elapsed;
}

function stopTimers() {
  clearInterval(timer); clearInterval(ticker);
  timer = ticker = null;
}

function startPolling() {
  timer = setInterval(() => poll(jobId), 2000);
  ticker = setInterval(() => { if (startTime) setStatus(lastDetail, { spin: true }); }, 1000);
}

function hidePicker() {
  picker.hidden = true;
  pickVideo.pause();
  pickVideo.removeAttribute("src");
  pickVideo.load();
}

function clipStart() { return parseFloat(startRange.value) || 0; }
function clipLength() { return parseFloat(lengthRange.value) || MAX_LEN; }

function syncSliders() {
  // start can reach only as far as duration - length
  startRange.max = Math.max(0, reelDuration - clipLength()).toFixed(1);
  if (clipStart() > parseFloat(startRange.max)) startRange.value = startRange.max;
  const s = clipStart(), len = clipLength();
  rangeLabel.textContent =
    `Using ${fmtClock(s)} → ${fmtClock(s + len)} of the reel (${len}s clip)`;
}

function showPicker(job) {
  stopTimers(); startTime = null;
  setStatus(job.detail || "Pick the part of the reel to use.");
  reelDuration = job.duration;
  lengthRange.max = Math.min(MAX_LEN, Math.floor(job.duration * 2) / 2);
  lengthRange.value = lengthRange.max;
  startRange.value = 0;
  syncSliders();
  pickVideo.src = job.reelUrl;
  picker.hidden = false;
  pickVideo.play().catch(() => {});
}

startRange.addEventListener("input", () => {
  syncSliders();
  pickVideo.currentTime = clipStart();
});

lengthRange.addEventListener("input", () => {
  syncSliders();
  pickVideo.currentTime = clipStart();
});

// Preview loops only the selected window.
pickVideo.addEventListener("timeupdate", () => {
  if (picker.hidden) return;
  const s = clipStart();
  if (pickVideo.currentTime > s + clipLength() || pickVideo.currentTime < s - 0.4) {
    pickVideo.currentTime = s;
    pickVideo.play().catch(() => {});
  }
});
pickVideo.addEventListener("ended", () => {
  if (!picker.hidden) { pickVideo.currentTime = clipStart(); pickVideo.play().catch(() => {}); }
});

useClip.addEventListener("click", async () => {
  useClip.disabled = true;
  try {
    const r = await fetch(`/api/jobs/${jobId}/clip`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ start: clipStart(), length: clipLength() }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "Request failed");
    hidePicker();
    startTime = Date.now(); lastDetail = "Clipping your selection…";
    setStatus(lastDetail, { spin: true });
    startPolling();
  } catch (err) {
    setStatus(err.message, { error: true });
  } finally {
    useClip.disabled = false;
  }
});

async function poll(jobId) {
  try {
    const r = await fetch(`/api/jobs/${jobId}`);
    const job = await r.json();
    if (job.status === "done") {
      stopTimers(); go.disabled = false;
      setStatus(`Done in ${fmtElapsed()} — here's you:`);
      startTime = null;
      resultEl.innerHTML =
        `<video controls autoplay loop src="${job.resultUrl}"></video>` +
        `<a class="dl" href="${job.resultUrl}" download>Download video</a>`;
    } else if (job.status === "awaiting_selection") {
      if (picker.hidden) showPicker(job);
    } else if (job.status === "error") {
      stopTimers(); startTime = null; go.disabled = false;
      setStatus(job.error || "Something went wrong.", { error: true });
    } else {
      lastDetail = job.detail || "Working…";
      setStatus(lastDetail, { spin: true });
    }
  } catch { /* transient — keep polling */ }
}

f.addEventListener("submit", async (e) => {
  e.preventDefault();
  resultEl.innerHTML = ""; go.disabled = true;
  hidePicker();
  stopTimers(); startTime = Date.now(); lastDetail = "Starting…";
  setStatus(lastDetail, { spin: true });
  try {
    const r = await fetch("/api/replicate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ reelUrl: urlEl.value }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "Request failed");
    jobId = data.jobId;
    startPolling();
  } catch (err) {
    stopTimers(); startTime = null; go.disabled = false;
    setStatus(err.message, { error: true });
  }
});
</script>
</body>
</html>
